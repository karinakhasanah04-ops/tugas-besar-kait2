<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | K-BasicThread Co.</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .admin-card {
            background: var(--bg-card);
            padding: 25px;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-soft);
            margin-bottom: 30px;
            border: 1px solid var(--border-color);
        }
        .admin-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        .admin-table th, .admin-table td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
            color: var(--text-main);
        }
        .admin-table th {
            background-color: var(--bg-primary);
            font-weight: 600;
        }
        .admin-input-edit {
            width: 90px;
            padding: 6px 8px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            font-family: 'Poppins', sans-serif;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 5px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
        }
        .btn-danger {
            background-color: #d9534f;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
        }
        .btn-danger:hover { background-color: #c9302c; }
        .back-link {
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1>Panel Admin: K-BasicThread Co.</h1>
            <a href="index.html" class="back-link">&larr; Kembali ke Website Pelanggan</a>
        </div>

        <div class="admin-card">
    <h3>Tambah Produk Baru</h3>
    <form id="form-tambah-produk" onsubmit="tambahProdukBaru(event)">
        <div class="form-grid">
            <div class="form-group">
                <label>Nama Produk</label>
                <input type="text" id="add-nama" required placeholder="Contoh: Classic Tee Grey">
            </div>
            <div class="form-group">
                <label>Kategori</label>
                <select id="add-kategori">
                    <option value="Kaos Polos">Kaos Polos</option>
                    <option value="Polo Shirt">Polo Shirt</option>
                </select>
            </div>
            <div class="form-group">
                <label>Harga (Rp)</label>
                <input type="number" id="add-harga" required placeholder="55000">
            </div>
            <div class="form-group">
                <label>Stok Awal</label>
                <input type="number" id="add-stok" required placeholder="20">
            </div>
            <div class="form-group">
                <label>Nama File Gambar</label>
                <input type="text" id="add-gambar" value="images/kaos-hitam.jpg" required>
            </div>
            <div class="form-group" style="grid-column: 1 / -1;">
                <label>Deskripsi Produk</label>
                <textarea id="add-deskripsi" rows="3" required placeholder="Tuliskan deskripsi lengkap produk..." style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: var(--radius-sm); font-family: 'Poppins', sans-serif;"></textarea>
            </div>
        </div>
        <button type="submit" class="btn-primary" style="margin-top: 15px; padding: 10px 20px;">Simpan Produk Baru</button>
    </form>
</div>
        <div class="admin-card">
            <h3>Daftar Produk Aktif & Stok</h3>
            <div style="overflow-x: auto;">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>Nama Produk</th>
                            <th>Kategori</th>
                            <th>Harga (Rp)</th>
                            <th>Stok</th>
                            <th>Terjual (Dinamis)</th>
                            <th>Rating (Dinamis)</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="admin-table-body">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
